<!DOCTYPE html>

        body {

            display: flex;

        .container {

            border: 2px solid transparent;

        }

        .link-button:hover {
            background-color: transparent;
            border-color: #1976d2; /* Borda azul no hover */

        }

        .footer {

        }

</head>
